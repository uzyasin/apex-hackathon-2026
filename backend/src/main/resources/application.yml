server:
  port: 3001

spring:
  datasource:
    url: jdbc:h2:mem:hackathon;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null

anthropic:
  api-key: ${ANTHROPIC_API_KEY:set-via-env-var}
  model: claude-sonnet-4-6
  max-tokens: 1024
