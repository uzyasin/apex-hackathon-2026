server:
  port: 3001

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: jdbc:h2:mem:hackathon;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null

anthropic:
  api-key: ${ANTHROPIC_API_KEY:set-via-env-var}
  model: claude-sonnet-4-6
  max-tokens: 2048

deepseek:
  api-key: 
  base-url: https://api.deepseek.com
  model: deepseek-chat
  max-tokens: 2048

# Aktif AI sağlayıcısı: "deepseek" veya "anthropic"
ai:
  provider: ${AI_PROVIDER:deepseek}

jira:
  base-url: https://jira.turkcell.com.tr
  token: 
  board-id: 23461
  story-point-field: customfield_10028
  # bearer = PAT token (Jira Data Center 8.14+) | basic = username:password base64
  auth-type: bearer

